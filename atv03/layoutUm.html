<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayoutUM</title>
    <link rel="stylesheet" href="telaUm.css">
</head>

<body>

    <header>

        <div class="header-logo">
            <div class="logo-icon"></div>
            Logo
        </div>

        <nav class="header-nav">
            <div class="nav-icon"></div>
            <div class="nav-link"></div>
            <div class="nav-link-sm"></div>
            <div class="nav-link-sm2"></div>
            <div class="btn-cta"></div>
        </nav>

    </header>

    <main>

        <section class="hero-left">
            <div class="hero-title"></div>
            <div class="hero-description"></div>
            <div class="hero-link"></div>
            <div class="hero-btn-primary"></div>
            <div class="hero-btn-secondary"></div>
        </section>

        <section class="hero-right">
            <div class="deco-card-sm"></div>
            <div class="deco-folder"></div>
            <div class="mockup-main"></div>
            <div class="mockup-modal"></div>
            <div class="deco-avatar"></div>
            <div class="deco-thumb"></div>
        </section>

    </main>
</body>

</html>
