<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayoutQuatro</title>
    <link rel="stylesheet" href="telaquatro.css">
</head>

<body>
    <main>

    <section class="trending">
        <h2 class="section-title">Em alta</h2>
        <div class="carousel">
            <div class="card">
                <div class="card-number">1</div>
                <div class="card-img"></div>
            </div>
            <div class="card">
                <div class="card-number">2</div>
                <div class="card-img"></div>
            </div>
            <div class="card">
                <div class="card-number">3</div>
                <div class="card-img"></div>
            </div>
            <div class="card">
                <div class="card-number">4</div>
                <div class="card-img"></div>
            </div>
            <div class="card">
                <div class="card-number">5</div>
                <div class="card-img"></div>
            </div>
            <div class="card">
                <div class="card-number">6</div>
                <div class="card-img"></div>
            </div>
            <div class="carousel-arrow"></div>
        </div>
    </section>

    <section class="reasons">
        <h2 class="section-title">Mais motivos para assinar</h2>
        <div class="cards-grid">
            <div class="reason-card">
                <div class="reason-text-block">
                    <div class="reason-title"></div>
                    <div class="reason-desc"></div>
                </div>
                <div class="reason-icon"></div>
            </div>
            <div class="reason-card">
                <div class="reason-text-block">
                    <div class="reason-title"></div>
                    <div class="reason-desc"></div>
                </div>
                <div class="reason-icon icon-circle"></div>
            </div>
            <div class="reason-card">
                <div class="reason-text-block">
                    <div class="reason-title"></div>
                    <div class="reason-desc"></div>
                </div>
                <div class="reason-icon"></div>
            </div>
            <div class="reason-card">
                <div class="reason-text-block">
                    <div class="reason-title"></div>
                    <div class="reason-desc"></div>
                </div>
                <div class="reason-icon"></div>
            </div>
        </div>
    </section>

    </main>
</body>

</html>
