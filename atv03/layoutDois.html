<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayoutDois</title>
    <link rel="stylesheet" href="telaDois.css">
</head>

<body>
    <header>
        <div class="header-left">
            <div class="logo"></div>
            <nav class="nav-links">
                <div class="nav-item"></div>
                <div class="nav-item"></div>
                <div class="nav-item"></div>
                <div class="nav-item"></div>
                <div class="nav-item-sm"></div>
            </nav>
        </div>
        <div class="header-right">
            <div class="btn-ghost"></div>
            <div class="btn-outline"></div>
            <div class="btn-solid"></div>
        </div>
    </header>

    <main>
        <section class="hero-left">
            <div class="hero-title"></div>
            <div class="hero-description"></div>
            <div class="hero-buttons">
                <div class="hero-btn-primary"></div>
                <div class="hero-btn-outline"></div>
            </div>
        </section>

        <section class="hero-right">
            <div class="deco-semicircle"></div>
            <div class="deco-pill-top"></div>
            <div class="deco-diamond">
                <div class="deco-diamond-inner"></div>
            </div>
            <div class="deco-pill-bottom"></div>
            <div class="deco-cloud"></div>
        </section>
    </main>
</body>

</html>
